<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1410"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8922e"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  
  <!-- Shiba face - ears -->
  <polygon points="130,100 155,160 105,160" fill="#e8922e"/>
  <polygon points="270,100 295,160 245,160" fill="#e8922e"/>
  <polygon points="135,108 155,155 115,155" fill="#f5d6a8"/>
  <polygon points="265,108 285,155 245,155" fill="#f5d6a8"/>
  
  <!-- Shiba face - main shape -->
  <ellipse cx="200" cy="210" rx="75" ry="70" fill="#e8922e"/>
  
  <!-- Shiba face - white cheeks -->
  <ellipse cx="160" cy="220" rx="35" ry="40" fill="#f5f0e8"/>
  <ellipse cx="240" cy="220" rx="35" ry="40" fill="#f5f0e8"/>
  
  <!-- White muzzle -->
  <ellipse cx="200" cy="245" rx="40" ry="30" fill="#f5f0e8"/>
  
  <!-- Eyes -->
  <ellipse cx="175" cy="195" rx="10" ry="12" fill="#1a1a2e"/>
  <ellipse cx="225" cy="195" rx="10" ry="12" fill="#1a1a2e"/>
  <ellipse cx="178" cy="192" rx="3" ry="4" fill="white" opacity="0.6"/>
  <ellipse cx="228" cy="192" rx="3" ry="4" fill="white" opacity="0.6"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="232" rx="9" ry="6" fill="#2a1a1a"/>
  <ellipse cx="197" cy="230" rx="2" ry="2" fill="white" opacity="0.3"/>
  
  <!-- Mouth -->
  <path d="M 185 240 Q 200 250 215 240" fill="none" stroke="#2a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Hippo body -->
  <ellipse cx="200" cy="310" rx="100" ry="55" fill="#5a4a6a"/>
  <ellipse cx="200" cy="310" rx="95" ry="50" fill="#6b5a7a"/>
  
  <!-- Hippo body highlights -->
  <ellipse cx="180" cy="295" rx="40" ry="15" fill="#7b6a8a" opacity="0.5"/>
  
  <!-- Squirrel tail -->
  <path d="M 290 280 Q 340 250 350 200 Q 360 150 330 140 Q 310 135 305 170 Q 300 200 285 260"
        fill="#d4783a" stroke="#b86228" stroke-width="1"/>
  <path d="M 290 280 Q 330 260 340 220 Q 345 190 325 170 Q 315 165 315 190 Q 310 230 290 270"
        fill="#e8922e" opacity="0.6"/>
  
  <!-- Legs -->
  <rect x="140" y="340" width="22" height="35" rx="8" fill="#5a4a6a"/>
  <rect x="238" y="340" width="22" height="35" rx="8" fill="#5a4a6a"/>
  <rect x="150" y="345" width="16" height="28" rx="6" fill="#4a3a5a"/>
  <rect x="248" y="345" width="16" height="28" rx="6" fill="#4a3a5a"/>
  
  <!-- $OOWW text -->
  <text x="200" y="395" font-family="Arial Black, sans-serif" font-size="32" font-weight="900"
        fill="url(#gold)" text-anchor="middle" letter-spacing="2">$OOWW</text>
</svg>
